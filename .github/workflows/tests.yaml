name: Linting

on:
  push:
    branches:
      - main
      - master
    paths:
      - "custom_components/**"
      - ".github/workflows/tests.yaml"
      - ".github/workflows/constraints.txt"
      - ".github/pre-commit.yml"
      - "hacs.json"
      - "requirements.txt"
      - "README.md"

env:
  DEFAULT_PYTHON: 3.12

concurrency:
  group: linting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: "ubuntu-latest"
    name: Pre-commit
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ env.DEFAULT_PYTHON }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Upgrade pip
        run: |
          pip install --constraint=.github/workflows/constraints.txt pip
          pip --version

      - name: Install Python modules
        run: |
          pip install --constraint=.github/workflows/constraints.txt pre-commit black flake8 reorder-python-imports

      - name: Run pre-commit on all files
        run: |
          pre-commit run --config .github/pre-commit.yml --all-files --show-diff-on-failure --color=always

  hacs:
    runs-on: "ubuntu-latest"
    name: HACS
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.2

      - name: HACS validation
        uses: hacs/action@22.5.0
        with:
          category: "integration"
          ignore: brands

  hassfest:
    runs-on: "ubuntu-latest"
    name: Hassfest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.2.2

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
